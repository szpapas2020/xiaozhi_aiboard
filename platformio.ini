; PlatformIO Project Configuration for ESP32-S3 AI Board
;   ESP32-S3-WROOM-1 N16R8 (16MB Flash, 8MB PSRAM)
;   1.9 inch LCD (170x320 IPS TFT)
;   WS2812 RGB LED
;   Microphone and Audio Amplifier

[env:esp32s3_ai_board]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -I include

; Upload options - 使用 USB 下载
upload_protocol = esptool
upload_speed = 921600

; Lib dependencies
lib_deps =
    ; WS2812 LED 库
    adafruit/Adafruit NeoPixel
    ; LCD 屏幕 (ST7789) - 由 PlatformIO 编译链接
    lovyan03/LovyanGFX
